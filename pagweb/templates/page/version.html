{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Version - Pemuda Advent Wilayah 13</title>

    <!-- Remix Icon (Local Static) -->
    <link rel="stylesheet" href="{% static 'remixicon/fonts/remixicon.css' %}">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800;900&family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #C9A770;
            --dark: #1A1614;
            --cream: #F5F1EB;
            --charcoal: #2C2823;
            --accent: #8B6F47;
            --light-gold: #E4D4BA;
        }

        body {
            background: linear-gradient(135deg, var(--cream) 0%, #EFE9E1 100%);
            color: var(--dark); min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
            position: relative; overflow-x: hidden; padding-top: 100px;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(201,167,112,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(139,111,71,0.06) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        body::after {
            content: ""; position: fixed; right: 0; top: 0; width: 3px; height: 100%;
            background: linear-gradient(180deg, var(--gold) 0%, var(--accent) 100%);
            z-index: 100; box-shadow: -2px 0 20px rgba(201,167,112,0.3);
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px 60px 60px; position: relative; z-index: 1; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .subtitle { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; }
        .decorative-line { width: 60px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 30px auto; }

        .developer-section { padding: 40px 0 60px; animation: fadeInUp 0.8s ease-out 0.4s both; }
        .section-header { text-align: center; max-width: 800px; margin: 0 auto 50px; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 56px; font-weight: 800; letter-spacing: -1px; line-height: 1.1; background: linear-gradient(135deg, var(--charcoal) 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 1rem; }

        .sub-label { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: var(--gold); letter-spacing: 4px; text-transform: uppercase; text-align: center; margin: 40px 0 20px; display: flex; align-items: center; gap: 16px; }
        .sub-label::before, .sub-label::after { content: ""; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }

        .developer-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 35px; margin-top: 10px; }
        .division-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-top: 10px; }

        .developer-card { background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); border: 1px solid rgba(201,167,112,0.2); border-radius: 24px; overflow: hidden; position: relative; transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1); box-shadow: 0 8px 32px rgba(0,0,0,0.06); display: flex; height: 200px; }
        .developer-card::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(201,167,112,0.1) 0%, transparent 70%); opacity: 0; transition: opacity 0.4s; }
        .developer-card:hover::before { opacity: 1; }
        .developer-card:hover { transform: translateY(-8px); box-shadow: 0 16px 48px rgba(201,167,112,0.2); border-color: var(--gold); }

        .card-photo { width: 240px; min-width: 240px; background: linear-gradient(135deg, var(--light-gold) 0%, rgba(201,167,112,0.3) 100%); display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 16px; font-weight: 700; font-family: 'Montserrat', sans-serif; letter-spacing: 2px; position: relative; overflow: hidden; }
        .card-photo::before { content: ""; position: absolute; width: 100%; height: 100%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.4), transparent); transform: translateX(-100%); animation: shimmer 3s infinite; }
        @keyframes shimmer { 100% { transform: translateX(100%); } }
        .card-photo img { width: 100%; height: 100%; object-fit: cover; }

        .card-content { flex: 1; display: flex; flex-direction: column; padding: 25px 30px; justify-content: center; }
        .card-role { background: linear-gradient(135deg, var(--gold), var(--accent)); color: white; padding: 6px 18px; border-radius: 50px; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; display: inline-block; width: fit-content; margin-bottom: 15px; }
        .card-name { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--charcoal); letter-spacing: 0.5px; line-height: 1.3; }

        .division-card { background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); border: 1px solid rgba(201,167,112,0.2); border-radius: 20px; overflow: hidden; position: relative; transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1); box-shadow: 0 6px 24px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .division-card:hover { transform: translateY(-8px); box-shadow: 0 16px 48px rgba(201,167,112,0.2); border-color: var(--gold); }

        .division-photo { width: 100%; height: 160px; background: linear-gradient(135deg, var(--light-gold) 0%, rgba(201,167,112,0.3) 100%); display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 14px; font-weight: 700; font-family: 'Montserrat', sans-serif; letter-spacing: 2px; overflow: hidden; position: relative; }
        .division-photo::before { content: ""; position: absolute; width: 100%; height: 100%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.4), transparent); transform: translateX(-100%); animation: shimmer 3s infinite; }
        .division-photo img { width: 100%; height: 100%; object-fit: cover; }
        .division-icon { font-size: 40px; color: var(--accent); opacity: 0.5; }
        .division-content { padding: 20px 22px 24px; }
        .division-label { background: linear-gradient(135deg, var(--gold), var(--accent)); color: white; padding: 5px 14px; border-radius: 50px; font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; display: inline-block; width: fit-content; margin-bottom: 10px; }
        .division-name { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700; color: var(--charcoal); line-height: 1.3; }

        .team-section { padding: 60px 0 100px; animation: fadeInUp 0.8s ease-out 0.6s both; }
        .team-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; margin-top: 50px; }
        .team-card { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.06); border: 1px solid rgba(201,167,112,0.2); transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1); display: flex; flex-direction: column; align-items: center; padding: 40px 28px 32px; text-align: center; }
        .team-card:hover { transform: translateY(-10px); box-shadow: 0 20px 60px rgba(201,167,112,0.25); border-color: var(--gold); }
        .team-photo { width: 150px; height: 150px; border-radius: 50%; overflow: hidden; margin-bottom: 24px; border: 3px solid var(--gold); box-shadow: 0 4px 20px rgba(201,167,112,0.2); transition: all 0.4s ease; }
        .team-card:hover .team-photo { border-color: var(--accent); box-shadow: 0 8px 30px rgba(201,167,112,0.4); transform: scale(1.05); }
        .team-photo img { width: 100%; height: 100%; object-fit: cover; }
        .team-photo-placeholder { width: 100%; height: 100%; background: linear-gradient(135deg, var(--light-gold), var(--cream)); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 56px; font-weight: 700; color: var(--accent); }
        .team-name { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--charcoal); margin-bottom: 8px; }
        .team-role { font-size: 12px; font-weight: 600; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; }
        .team-description { font-size: 13px; color: var(--accent); line-height: 1.6; margin-bottom: 20px; padding: 0 6px; }
        .team-socials { display: flex; gap: 10px; justify-content: center; }
        .social-link { width: 38px; height: 38px; border-radius: 50%; background: var(--cream); display: flex; align-items: center; justify-content: center; color: var(--accent); text-decoration: none; font-size: 18px; transition: all 0.3s ease; }
        .social-link:hover { background: linear-gradient(135deg, var(--gold), var(--accent)); color: white; transform: translateY(-3px); }

        /* spacer untuk menjaga jarak sebelum footer component (biar konsisten) */
        .footer-wrap { margin-top: 0; }

        /* ── RESPONSIVE ── */
        @media (max-width: 1100px) {
            .team-grid { grid-template-columns: repeat(3, 1fr); }
            .developer-grid { grid-template-columns: repeat(2, 1fr); }
            .division-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            body { padding-top: 70px; }
            .container { padding: 16px 16px 60px; }
            .section-title { font-size: 28px; letter-spacing: -0.5px; }
            .subtitle { font-size: 13px; letter-spacing: 2px; }
            .section-header { margin-bottom: 30px; }
            .decorative-line { margin: 16px auto; }
            .developer-section { padding: 20px 0 40px; }
            .developer-grid { grid-template-columns: 1fr; gap: 16px; margin-top: 24px; }
            .developer-card { height: auto; min-height: 120px; border-radius: 16px; }
            .card-photo { width: 120px; min-width: 120px; font-size: 13px; letter-spacing: 1px; }
            .card-content { padding: 16px 20px; }
            .card-role { font-size: 10px; padding: 4px 12px; margin-bottom: 8px; }
            .card-name { font-size: 18px; }
            .division-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; margin-top: 16px; }
            .division-photo { height: 110px; }
            .division-icon { font-size: 28px; }
            .division-content { padding: 14px 16px 18px; }
            .division-name { font-size: 14px; }
            .sub-label { font-size: 11px; letter-spacing: 3px; margin: 28px 0 14px; }
            .team-section { padding: 30px 0 60px; }
            .team-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; margin-top: 24px; }
            .team-card { padding: 24px 16px 20px; border-radius: 16px; }
            .team-photo { width: 100px; height: 100px; margin-bottom: 14px; border-width: 2px; }
            .team-photo-placeholder { font-size: 38px; }
            .team-name { font-size: 16px; margin-bottom: 4px; }
            .team-role { font-size: 10px; letter-spacing: 1px; margin-bottom: 8px; }
            .team-description { font-size: 11px; margin-bottom: 14px; padding: 0; }
            .team-socials { gap: 8px; }
            .social-link { width: 32px; height: 32px; font-size: 15px; }
        }

        @media (max-width: 400px) {
            .team-grid { grid-template-columns: 1fr; }
            .team-card { padding: 28px 20px 24px; }
            .team-photo { width: 120px; height: 120px; }
            .team-photo-placeholder { font-size: 48px; }
            .team-name { font-size: 20px; }
            .developer-card { min-height: 110px; }
            .card-photo { width: 100px; min-width: 100px; }
            .card-name { font-size: 16px; }
            .division-grid { grid-template-columns: 1fr; }
        }

        html { scroll-behavior: smooth; }
        ::selection { background: var(--gold); color: white; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(201,167,112,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body>

    {% include "components/navbar.html" with active_page="version" %}

            <div class="section-header">
                <h2 class="section-title">Structur Organization</h2>

            document.getElementById('teamGrid').innerHTML = teamMembers.map((member, i) => `
