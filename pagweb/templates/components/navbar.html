{% load static %}
<nav class="main-nav" id="navbar">
    <div class="nav-inner">

        <a class="nav-brand" href="{% url 'home' %}">
            <img src="{% static 'resource/img/logo-polos1.png' %}" alt="Logo PAG Wilayah 13" class="nav-logo">
            <div class="nav-brand-text">
                <span class="nav-brand-title">Pemuda Advent</span>
                <span class="nav-brand-subtitle">Wilayah 13</span>
            </div>
        </a>

        <ul class="nav-menu" id="navMenu">
            <li><a href="{% url 'home' %}"       class="nav-link {% if active_page == 'home' %}active{% endif %}">Home</a></li>
            <li><a href="{% url 'blog' %}"        class="nav-link {% if active_page == 'blog' %}active{% endif %}">Blog</a></li>
            <li><a href="{% url 'event' %}"       class="nav-link {% if active_page == 'event' %}active{% endif %}">Event</a></li>
            <li><a href="{% url 'product' %}"      class="nav-link {% if active_page == 'product' %}active{% endif %}">Produk</a></li>
            <li><a href="{% url 'request' %}"  class="nav-link {% if active_page == 'request' %}active{% endif %}">Permohonan</a></li>
            <li><a href="{% url 'information' %}"   class="nav-link {% if active_page == 'information' %}active{% endif %}">Informasi Ibadah</a></li>
            <li><a href="{% url 'version' %}"     class="nav-link {% if active_page == 'version' %}active{% endif %}">Version</a></li>
        </ul>

        <button class="menu-toggle" id="menuToggle" aria-label="Buka menu">
            <span></span><span></span><span></span>
        </button>

    </div>
</nav>

<style>
/* ── NAVBAR BASE ── */
.main-nav {
    position: fixed; top: 0; left: 0; right: 0;
    background: rgba(255, 255, 255, 0.97);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(201, 167, 112, 0.18);
    z-index: 1000;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s ease;
    box-shadow: 0 2px 20px rgba(0, 0, 0, 0.05);
}
.main-nav.nav-hidden   { transform: translateY(-100%); }
.main-nav.nav-scrolled { box-shadow: 0 6px 28px rgba(0, 0, 0, 0.09); }

/* ── INNER LAYOUT ── */
.nav-inner {
    max-width: 1400px; margin: 0 auto;
    padding: 14px 60px;
    display: flex; align-items: center; justify-content: space-between;
}

/* ── BRAND ── */
.nav-brand {
    display: flex; align-items: center; gap: 14px;
    text-decoration: none; flex-shrink: 0;
    transition: transform 0.3s ease, opacity 0.3s ease;
}
.nav-brand:hover { transform: scale(1.02); opacity: 0.9; }
.nav-logo {
    width: 96px; height: 70px; object-fit: contain;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.08));
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.nav-brand:hover .nav-logo { transform: rotate(4deg); }
.nav-brand-text { display: flex; flex-direction: column; gap: 2px; }
.nav-brand-title,
.nav-brand-subtitle {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px; font-weight: 500;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--charcoal); line-height: 1.4;
}

/* ── MENU ── */
.nav-menu {
    display: flex; align-items: center; list-style: none;
    gap: 2px;
    background: rgba(245, 241, 235, 0.5);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(201, 167, 112, 0.25);
    border-radius: 50px; padding: 2px;
}

/* ── LINKS ── */
.nav-link {
    display: block; border-radius: 50px;
    padding: 8px 20px;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px; font-weight: 500; letter-spacing: 1px;
    text-transform: uppercase; color: var(--charcoal);
    text-decoration: none;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative; overflow: hidden; white-space: nowrap;
}
.nav-link::before {
    content: "";
    position: absolute; top: 50%; left: 50%;
    width: 0; height: 0; border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--accent));
    transform: translate(-50%, -50%);
    transition: width 0.4s, height 0.4s; z-index: -1;
}
.nav-link:hover::before,
.nav-link.active::before { width: 120%; height: 300%; }
.nav-link:hover,
.nav-link.active { color: white; }

/* ── HAMBURGER ── */
.menu-toggle {
    display: none; flex-direction: column; gap: 5px;
    cursor: pointer; padding: 10px;
    background: transparent; border: none;
}
.menu-toggle span {
    width: 25px; height: 2px;
    background: var(--charcoal); border-radius: 2px;
    transition: all 0.3s ease; display: block;
}
.menu-toggle.is-active span:nth-child(1) { transform: rotate(45deg) translate(7px, 7px); }
.menu-toggle.is-active span:nth-child(2) { opacity: 0; }
.menu-toggle.is-active span:nth-child(3) { transform: rotate(-45deg) translate(7px, -7px); }

/* ── RESPONSIVE ── */
@media (max-width: 968px) {
    .nav-inner { padding: 12px 20px; }
    .nav-logo  { width: 60px; height: 40px; }
    .nav-brand-title,
    .nav-brand-subtitle { font-size: 9px; letter-spacing: 1.5px; }

    .menu-toggle { display: flex; }

    .nav-menu {
        position: absolute;
        top: 100%; left: 0; right: 0;
        flex-direction: column;
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(20px);
        border: none;
        border-top: 1px solid rgba(201, 167, 112, 0.2);
        border-radius: 0 0 20px 20px;
        padding: 12px; gap: 4px;
        transform: translateY(-10px);
        opacity: 0; pointer-events: none;
        transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
        box-shadow: 0 16px 40px rgba(0,0,0,0.12);
    }
    .nav-menu.menu-open {
        transform: translateY(0);
        opacity: 1; pointer-events: all;
    }
    .nav-menu li { width: 100%; }
    .nav-link {
        width: 100%; text-align: center;
        padding: 13px 20px; border-radius: 12px; font-size: 12px;
    }
}
</style>
